name: 🐍 Snake & Daily Activity

on:
  schedule:
    - cron: "0 0 * * *"   # Every day at midnight UTC
  workflow_dispatch:        # Manual trigger
  push:
    branches:
      - main

jobs:
  # ─── Job 1: Regenerate the snake SVG ───────────────────────────────────────
  generate-snake:
    name: Generate Snake Animation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate snake SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push SVGs to output branch
        run: |
          cd dist

          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout --orphan output
          git add -A
          git commit -m "🐍 Snake update — $(date -u '+%Y-%m-%d') [skip ci]"

          git push --force \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" \
            output
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── Job 2: Daily activity commit to keep profile alive ────────────────────
  daily-commit:
    name: Daily Activity Commit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    needs: generate-snake

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Write daily activity log
        run: |
          DATE=$(date -u "+%Y-%m-%d %H:%M UTC")
          DAY=$(date -u "+%A")
          WEEK=$(date -u "+%V")

          mkdir -p .github/logs

          echo "[$DATE] 🟢 Active — Week $WEEK, $DAY" >> .github/logs/activity.log

          # Keep only last 365 entries
          tail -365 .github/logs/activity.log > .github/logs/activity.log.tmp
          mv .github/logs/activity.log.tmp .github/logs/activity.log

          # Write shields.io endpoint badge JSON
          DAYS_ACTIVE=$(wc -l < .github/logs/activity.log | tr -d ' ')
          cat > .github/logs/streak.json << JSON
          {
            "schemaVersion": 1,
            "label": "days active",
            "message": "${DAYS_ACTIVE}d",
            "color": "blueviolet"
          }
          JSON

      - name: Commit and push activity log
        run: |
          git add .github/logs/
          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "📊 Daily activity — $(date -u '+%Y-%m-%d') [skip ci]"
            git push
          fi
